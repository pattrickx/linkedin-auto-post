services:
  api:
    build: .
    container_name: linkedin-auto-post-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - APP_NAME=linkedin-auto-post-api
      - APP_VERSION=1.0.0
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request, sys\ntry:\n    print(urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read().decode())\nexcept Exception:\n    sys.exit(1)\nPY"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
